<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dana Cermat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- HEADER -->
         <header>
            <h2>Dana Cermat</h2>
         </header>

        <!-- SALDO -->
          <section class="saldo-box">
              <p>Saldo Anda</p>
              <h1>Rp 5.750.000</h1>
    </section> 

        <!-- MENU -->  
         <div class="menu">
            <button>Kirim Uang</button>
            <button>Top Up</button>
            <button>Bayar</button>
         </div> 
         
        <!-- TRANSAKSI -->
         <h3>Transaksi Terakhir</h3>
         <div class="list">
            <div class="item keluar">
                <span>Belanja Harian</span>
                <span>- Rp 120.000</span>
            </div>
            <div class="item masuk">
                <span>Gaji Bulanan</span>
                <span>+ Rp 3.500.000</span>
            </div>
            <div class="item keluar">
                <span>Pembayaran Listrik</span>
                <span>- Rp 250.000</span>
            </div>
         </div>
         
    </div>
    
</body>
</html>
